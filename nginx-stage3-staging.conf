# Temporary nginx listener for the PR 3 staging deploy.
#
# Exposes the combined server (port 3100) on https://samply.uni-konstanz.de:4002
# alongside the existing 443 (Express) and 4001 (Next.js Stage 2) listeners.
# Lets you smoke-test the combined server in production conditions without
# touching any user-facing endpoint.
#
# DEPLOY:
#   sudo cp nginx-stage3-staging.conf /etc/nginx/sites-available/samply-stage3-staging
#   sudo ln -s /etc/nginx/sites-available/samply-stage3-staging /etc/nginx/sites-enabled/
#   sudo ufw allow 4002/tcp
#   sudo nginx -t && sudo systemctl reload nginx
#
# TEARDOWN (after PR 4 cutover succeeds):
#   sudo rm /etc/nginx/sites-enabled/samply-stage3-staging
#   sudo ufw delete allow 4002/tcp
#   sudo systemctl reload nginx

server {
    listen 4002 ssl;
    server_name samply.uni-konstanz.de samply.uni.kn;

    # Same Certbot cert as the rest of the site.
    ssl_certificate     /etc/letsencrypt/live/samply.uni-konstanz.de-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/samply.uni-konstanz.de-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass         http://localhost:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
