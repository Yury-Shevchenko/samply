# nginx config for Stage 1 internal testing.
#
# Adds a second HTTPS listener on port 4001 → Next.js on port 3001.
# Reuses the existing Certbot certificate — no DNS change needed.
# Express on port 3000 (port 443) is completely unaffected.
#
# Before applying, verify port 4001 is free on the server:
#   sudo ss -tlnp | grep 4001
# If 4001 is taken, pick another free port and replace it below.
#
# SETUP:
# 1. sudo cp nginx-stage1.conf /etc/nginx/sites-available/samply-
# 2. sudo ln -s /etc/nginx/sites-available/samply /etc/nginx/sites-enabled/
# 3. sudo ufw allow 4001/tcp
# 4. sudo nginx -t && sudo systemctl reload nginx
#
# Access the new UI at: https://samply.uni-konstanz.de:4001
#
# TEARDOWN (after Stage 2 subdomain is live):
#   sudo rm /etc/nginx/sites-enabled/samply-next-stage1
#   sudo ufw delete allow 4001/tcp
#   sudo systemctl reload nginx

server {
    listen 4001 ssl;
    server_name samply.uni-konstanz.de samply.uni.kn;

    # Certbot-managed certificate — same as the main site
    ssl_certificate     /etc/letsencrypt/live/samply.uni-konstanz.de-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/samply.uni-konstanz.de-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
