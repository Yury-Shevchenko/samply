# nginx config for Stage 3 cutover.
#
# Port 443 (samply.uni-konstanz.de) now serves the Next.js app by default.
# Express (port 3000) continues to handle:
#   - Mobile app API (/api/* except /api/auth, /api/stripe, /api/analytics)
#   - Researcher REST API (/webapi/v1/*)
#   - Result submission (/save)
#   - Uploaded files (/uploads/*)
#
# DEPLOYMENT:
#   sudo cp ~/nginx-port443-pre-cutover.bak ~/nginx-port443-pre-cutover.bak   # confirm backup exists
#   sudo cp nginx-cutover.conf /etc/nginx/sites-available/samply              # name MUST match current
#   sudo nginx -t && sudo systemctl reload nginx
#
# ROLLBACK:
#   sudo cp ~/nginx-port443-pre-cutover.bak /etc/nginx/sites-available/samply
#   sudo nginx -t && sudo systemctl reload nginx

# Reusable proxy block — applied via `include` in each location.
# Keep header forwarding identical to the Stage 1 config so Next.js sees
# the same Host / X-Forwarded-* values it has been getting on port 4001.

# Optional: redirect bare old Pug URLs to new equivalents. Extend as needed.
map $uri $samply_redirect {
    default                               "";
    ~^/researcher/?$                      /projects;
    ~^/researcher/projects/?$             /projects;
}

server {
    listen 443 ssl http2;
    server_name samply.uni-konstanz.de samply.uni.kn;

    # SSL — MUST match your current 443 cert paths. Verify with:
    #   sudo nginx -T | grep -A2 'listen 443'
    ssl_certificate     /etc/letsencrypt/live/samply.uni-konstanz.de-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/samply.uni-konstanz.de-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    if ($samply_redirect != "") {
        return 301 $samply_redirect;
    }

    # ---- Next.js-owned API namespaces (more specific — must come first) ----
    location /api/auth/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location /api/stripe/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/analytics/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Express-owned API + special paths ----
    location /api/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /webapi/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /save {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Default: Next.js ----
    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# Port 4001 (Stage 1 listener) — redirect to the main domain for any
# bookmarked URL. Remove this server block one week after Stage 3c completes.
server {
    listen 4001 ssl;
    server_name samply.uni-konstanz.de samply.uni.kn;

    ssl_certificate     /etc/letsencrypt/live/samply.uni-konstanz.de-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/samply.uni-konstanz.de-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://samply.uni-konstanz.de$request_uri;
}
