# nginx config for Stage 3 cutover — combined server edition.
#
# Port 443 (samply.uni-konstanz.de) proxies to the combined server on
# localhost:3000. The combined server handles all path dispatch in-process
# (server.js → Express for /api/*, /webapi/*, /save; Next.js for everything
# else). No path splits needed here.
#
# DEPLOY (assuming current 443 site is at /etc/nginx/sites-available/samply):
#   sudo cp /etc/nginx/sites-available/samply ~/nginx-port443-pre-cutover.bak
#   sudo cp nginx-cutover.conf /etc/nginx/sites-available/samply
#   sudo nginx -t && sudo systemctl reload nginx
#
# ROLLBACK:
#   sudo cp ~/nginx-port443-pre-cutover.bak /etc/nginx/sites-available/samply
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name samply.uni-konstanz.de samply.uni.kn;

    # SSL — adjust paths to match your current 443 cert if different.
    ssl_certificate     /etc/letsencrypt/live/samply.uni-konstanz.de-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/samply.uni-konstanz.de-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
